<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Recordings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="/icon/48.png" alt="" class="header-icon">
      <h1 class="header-title">Recordings</h1>
      <span id="count" class="header-count"></span>
    </header>
    <div id="notice" class="notice" hidden>
      <div class="notice-dot"></div>
      <span class="notice-text"></span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>
      <p class="empty-text">No recordings yet</p>
      <p class="empty-hint">Record your screen from the Bloom toolbar icon. Your clips will appear here.</p>
    </div>
    <div id="bulk-bar" class="bulk-bar">
      <span id="bulk-count" class="bulk-count"></span>
      <button id="bulk-delete" class="bulk-delete">Delete</button>
      <button id="bulk-cancel" class="bulk-cancel">Cancel</button>
    </div>
  </div>
  <div id="player" class="player-overlay" hidden>
    <div class="player-backdrop"></div>
    <div class="player-content">
      <video id="player-video" class="player-video" controls playsinline></video>
      <button id="player-close" class="player-close" aria-label="Close">&times;</button>
    </div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
