<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Recordings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="/icon/48.png" alt="" class="header-icon">
      <h1 class="header-title">Recordings</h1>
      <span id="count" class="header-count"></span>
    </header>
    <div id="notice" class="notice" hidden>
      <div class="notice-dot"></div>
      <span class="notice-text"></span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>
      <p class="empty-text">No recordings yet</p>
      <p class="empty-hint">Record your screen from the Bloom toolbar icon. Your clips will appear here.</p>
    </div>
    <div id="bulk-bar" class="bulk-bar">
      <span id="bulk-count" class="bulk-count"></span>
      <button id="bulk-delete" class="bulk-delete">Delete</button>
      <button id="bulk-cancel" class="bulk-cancel">Cancel</button>
    </div>
  </div>
  <div id="upload-confirm" class="confirm-overlay" hidden>
    <div class="confirm-backdrop"></div>
    <div class="confirm-panel">
      <h2>Review before uploading</h2>
      <div class="confirm-preview">
        <img id="confirm-thumb" class="confirm-thumb" alt="" />
        <span id="confirm-info" class="confirm-info"></span>
      </div>
      <div class="confirm-field">
        <label>Upload to</label>
        <div id="confirm-server" class="confirm-value mono"></div>
      </div>
      <div class="confirm-field">
        <label class="confirm-check-label">
          <input type="checkbox" id="confirm-nostr" />
          Publish note to Nostr
        </label>
        <div id="confirm-nostr-details" style="display:none">
          <div id="confirm-relays" class="confirm-sub"></div>
          <div class="confirm-note-field">
            <label for="confirm-note">Note</label>
            <textarea id="confirm-note" class="confirm-note" rows="3" placeholder="Say something about this video…"></textarea>
          </div>
          <div class="confirm-identity-row">
            <label>Signing as</label>
            <div id="confirm-identity" class="confirm-value mono"></div>
          </div>
        </div>
      </div>
      <div id="confirm-warning" class="confirm-warning" style="display:none"></div>
      <div id="confirm-status" class="confirm-status" style="display:none">
        <div id="confirm-status-text" class="confirm-status-text"></div>
      </div>
      <div id="confirm-actions" class="confirm-actions">
        <button id="confirm-upload-btn" class="confirm-btn-primary">Confirm Upload</button>
        <button id="confirm-cancel-btn" class="confirm-btn-secondary">Cancel</button>
      </div>
      <div id="confirm-done-actions" class="confirm-actions" style="display:none">
        <button id="confirm-copy-btn" class="confirm-btn-primary">Copy URL</button>
        <button id="confirm-close-btn" class="confirm-btn-secondary">Done</button>
      </div>
    </div>
  </div>
  <div id="player" class="player-overlay" hidden>
    <div class="player-backdrop"></div>
    <div class="player-content">
      <video id="player-video" class="player-video" controls playsinline></video>
      <button id="player-close" class="player-close" aria-label="Close">&times;</button>
    </div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
