<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flora - Review Recording</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Flora</h1>
      <a href="#" id="settings-link" class="settings-link">Settings</a>
    </header>

    <div id="view-preview" class="view">
      <video id="preview-video" controls></video>
      <div id="preview-meta" class="meta"></div>

      <div class="destination-card editable">
        <div class="field">
          <label>Sharing</label>
          <div id="sharing-mode-picker" class="sharing-mode-picker" role="radiogroup" aria-label="Sharing mode">
            <button class="sharing-mode-btn active" data-mode="public" role="radio" aria-checked="true">Public</button>
            <button class="sharing-mode-btn" data-mode="unlisted" role="radio" aria-checked="false">Unlisted</button>
            <button class="sharing-mode-btn" data-mode="private" role="radio" aria-checked="false">Private</button>
          </div>
        </div>
        <div id="public-options">
          <div class="field">
            <label>Blossom server</label>
            <div id="dest-server" class="field-value"></div>
          </div>
          <div class="field" id="relay-section">
            <label>Nostr relays</label>
            <div id="dest-relays" class="field-value"></div>
          </div>
        </div>
        <div id="unlisted-options" style="display:none">
          <div class="field">
            <label>Blossom server</label>
            <div id="dest-server-unlisted" class="field-value"></div>
          </div>
        </div>
        <div id="private-options" style="display:none">
          <div class="field">
            <label for="recipient-input">Send to</label>
            <div class="recipient-chips" id="recipient-chips"></div>
            <div class="recipient-input-wrap">
              <input type="text" id="recipient-input" class="field-input" placeholder="npub, name, or user@domain" autocomplete="off" />
              <div id="recipient-dropdown" class="recipient-dropdown" role="listbox" aria-label="Recipient suggestions" style="display:none"></div>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Identity</label>
          <div id="dest-identity" class="field-value mono"></div>
        </div>
      </div>

      <div id="signer-warning" class="warning" style="display:none"></div>

      <div class="actions">
        <button id="btn-upload" class="btn-primary">Upload &amp; Share</button>
        <div class="actions-row">
          <button id="btn-download" class="btn-secondary">Save to device</button>
          <button id="btn-discard" class="btn-ghost">Discard</button>
        </div>
      </div>
    </div>

    <div id="view-progress" class="view" style="display:none">
      <div class="progress-section">
        <div id="progress-status" class="progress-text">Uploading…</div>
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
        </div>
        <div id="progress-detail" class="progress-detail"></div>
      </div>
    </div>

    <div id="view-complete" class="view" style="display:none">
      <div class="complete-section">
        <div class="complete-icon">&#10003;</div>
        <div id="complete-title" class="complete-title">You're live</div>
        <a id="result-link" class="result-link" target="_blank"></a>
        <div id="complete-recipients" class="complete-recipients" style="display:none"></div>
        <div class="actions">
          <button id="btn-copy" class="btn-primary">Copy link</button>
          <button id="btn-new" class="btn-secondary">Record another</button>
        </div>
      </div>
    </div>

    <div id="view-error" class="view" style="display:none">
      <div class="error-section">
        <div class="error-title">Upload didn't work</div>
        <div id="error-message" class="error-message"></div>
        <div class="actions">
          <button id="btn-retry" class="btn-primary">Try again</button>
          <button id="btn-error-discard" class="btn-ghost">Discard recording</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
