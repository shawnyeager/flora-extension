<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="controls">
    <div class="rec-dot"></div>
    <span class="timer">00:00</span>
    <div class="divider"></div>
    <button class="btn" id="pause-btn" aria-label="Pause recording"></button>
    <button class="btn" id="mic-btn" aria-label="Mute microphone"></button>
    <button class="btn" id="cam-btn" aria-label="Turn camera off"></button>
    <button class="btn btn-stop" id="stop-btn" aria-label="Stop recording"></button>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
