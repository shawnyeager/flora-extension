<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bloom - Settings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <h1>Bloom Settings</h1>

    <section>
      <h2>Blossom Servers</h2>
      <p class="hint">First server is used as default. One URL per line.</p>
      <textarea id="servers" rows="3" placeholder="https://blossom.band"></textarea>
    </section>

    <section>
      <h2>Nostr Relays</h2>
      <p class="hint">Relays used when publishing notes. One URL per line.</p>
      <textarea id="relays" rows="3" placeholder="wss://relay.damus.io"></textarea>
    </section>

    <section>
      <h2>Publishing</h2>
      <label class="toggle-label">
        <input type="checkbox" id="publish-toggle" />
        Publish note to Nostr by default
      </label>
    </section>

    <section>
      <h2>Identity</h2>
      <div id="identity" class="identity-display">Checking...</div>
    </section>

    <div class="actions">
      <button id="btn-save" class="btn-save">Save Settings</button>
      <div id="save-status" class="save-status"></div>
    </div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
