<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom Settings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="/icon/48.png" alt="" class="header-icon">
      <div>
        <h1 class="header-title">Bloom</h1>
        <p class="header-sub">Settings</p>
      </div>
    </header>

    <div class="group">
      <h2 class="group-title">Connection</h2>

      <div class="field">
        <label class="field-label" for="servers">Blossom servers</label>
        <textarea id="servers" rows="2" placeholder="https://blossom.band" spellcheck="false" autocomplete="off"></textarea>
        <p class="field-hint">Upload destination. First URL is the default.</p>
      </div>

      <div class="field">
        <label class="field-label" for="relays">Nostr relays</label>
        <textarea id="relays" rows="2" placeholder="wss://relay.damus.io" spellcheck="false" autocomplete="off"></textarea>
        <p class="field-hint">One per line.</p>
      </div>

      <label class="toggle-row">
        <input type="checkbox" id="publish-toggle">
        <span>Publish to Nostr by default</span>
      </label>
    </div>

    <div class="group">
      <h2 class="group-title">Identity</h2>
      <div id="identity" class="identity-display">
        <span class="identity-value"></span>
        <span class="identity-hint"></span>
      </div>
    </div>

    <button id="btn-save" class="btn-save">Save settings</button>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
